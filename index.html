<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaSMaster — War Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
:root{
  --bg:#f5f4fb;--surface:#fff;--border:#e0dcf4;--border-light:#eceaf8;
  --purple:#5040a0;--purple-light:#7060c0;--purple-pale:#f0eeff;
  --text:#1a1830;--text-muted:#6860a0;--text-faint:#a0a0c0;
  --green:#1a7a40;--green-bg:#e8fff0;--green-border:#a0e0b8;
  --red:#a02020;--red-bg:#fff0f0;--red-border:#f0a0a0;
  --amber:#8a5010;--amber-bg:#fff8ee;--amber-border:#f0c060;
  --blue:#1a5080;--blue-bg:#f0f4ff;--blue-border:#a0c0f0;
  --teal:#1a6850;--teal-bg:#f0fff8;--teal-border:#80e0c0;
  --high:#c02020;--high-bg:#fff0f0;--high-border:#f0a0a0;
  --med:#b06000;--med-bg:#fff8ee;--med-border:#f0c060;
  --explore:#1a5080;--explore-bg:#f0f4ff;--explore-border:#a0c0f0;
  --done:#1a7a40;--done-bg:#e8fff0;--done-border:#a0e0b8;
  --font:Inter,system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(80,64,160,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.brand{font-size:20px;font-weight:700;color:var(--purple);letter-spacing:-0.01em}
.brand span{color:var(--text-faint)}
.status-pills{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;font-weight:500}
.pill.online{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.pill.amber{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.pill.gray{background:var(--bg);border-color:var(--border);color:var(--text-muted)}
.pill.red{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-right{font-size:11px;color:var(--text-faint);font-family:var(--mono);white-space:nowrap}

.alert-banner{padding:10px 24px;display:flex;align-items:center;gap:12px;border-left:4px solid}
.alert-banner.critical{background:#fff4e8;border-color:#e05020;color:#7a2000}
.alert-banner.warning{background:var(--amber-bg);border-color:#d4a030;color:#7a5010}
.alert-banner.success{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.alert-icon{font-size:16px;flex-shrink:0}
.alert-msg{flex:1;font-size:12px;font-weight:500}
.alert-detail{font-size:11px;opacity:.8;font-weight:400}
.alert-dismiss{background:none;border:none;cursor:pointer;opacity:.5;font-size:16px;padding:0 4px;color:inherit}
.alert-dismiss:hover{opacity:1}

.page{max-width:1400px;margin:0 auto;padding:20px 24px}
.section-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border-light)}

.debrief{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.debrief-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.debrief-panel.failed{border-left:3px solid var(--high)}
.debrief-panel.ran{border-left:3px solid var(--green)}
.debrief-header{font-size:11px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.debrief-header.ok{color:var(--green)}
.debrief-header.fail{color:var(--red)}
.debrief-table{width:100%;border-collapse:collapse}
.debrief-table th{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);text-align:left;padding:3px 6px;border-bottom:1px solid var(--border-light)}
.debrief-table td{font-size:11px;padding:5px 6px;border-bottom:1px solid var(--border-light);vertical-align:top}
.debrief-table tr:last-child td{border-bottom:none}
.debrief-table .time{color:var(--text-faint);font-family:var(--mono);font-size:10px;white-space:nowrap}
.debrief-table .agent{font-weight:500;color:var(--text)}
.debrief-table .result{color:var(--text-muted)}
.status-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600}
.tag-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.tag-fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.tag-running{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi-card.jarvis::after{background:var(--purple)}
.kpi-card.queue::after{background:var(--high)}
.kpi-card.agents::after{background:#8b5cf6}
.kpi-card.market::after{background:var(--teal)}
.kpi-card.pipeline::after{background:#06b6d4}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:4px;font-weight:600}
.kpi-val{font-size:24px;font-weight:700;line-height:1;margin-bottom:4px}
.kpi-card.jarvis .kpi-val{color:var(--purple)}
.kpi-card.queue .kpi-val{color:var(--high)}
.kpi-card.agents .kpi-val{color:#7c3aed}
.kpi-card.market .kpi-val{color:var(--teal)}
.kpi-card.pipeline .kpi-val{color:#0891b2;font-size:16px;padding-top:4px}
.kpi-sub{font-size:10px;color:var(--text-faint)}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;padding:2px 7px;border-radius:20px;margin-top:5px;font-weight:600}
.kpi-badge.online{background:var(--green-bg);color:var(--green)}
.kpi-badge.building{background:var(--amber-bg);color:var(--amber)}
.kpi-badge.live{background:var(--purple-pale);color:var(--purple)}
.kpi-badge.offline{background:var(--red-bg);color:var(--red)}

.two-col{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:20px}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.panel-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.panel-badge{font-size:9px;padding:2px 8px;border-radius:20px;background:var(--purple-pale);color:var(--purple);font-weight:600}
.heatmap-grid{display:grid;grid-template-columns:repeat(28,1fr);gap:2px}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--border-light)}
.hm-cell.l1{background:#d8d0f8}
.hm-cell.l2{background:#b0a0f0}
.hm-cell.l3{background:#8060e0}
.hm-cell.l4{background:#5040c0}
.hm-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:var(--text-faint)}

.agent-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light)}
.agent-row:last-child{border-bottom:none}
.agent-icon{width:28px;height:28px;border-radius:6px;background:var(--purple-pale);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-right:10px}
.agent-info{flex:1}
.agent-name{font-size:12px;font-weight:600;color:var(--text)}
.agent-schedule{font-size:10px;color:var(--text-faint);font-family:var(--mono)}
.agent-bar{height:3px;border-radius:2px;background:var(--border-light);margin-top:5px;overflow:hidden}
.agent-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--purple-light))}
.agent-status{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;margin-left:8px}
.s-ok{background:var(--green-bg);color:var(--green)}
.s-running{background:var(--amber-bg);color:var(--amber)}
.s-pending{background:var(--bg);color:var(--text-faint);border:1px solid var(--border)}
.s-error{background:var(--red-bg);color:var(--red)}

.pipe-progress{margin-top:10px;padding:10px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)}
.pipe-header{display:flex;justify-content:space-between;font-size:10px;margin-bottom:6px}
.pipe-label{font-weight:600;color:#0891b2}
.pipe-pct{font-family:var(--mono);color:var(--text-muted)}
.pipe-track{height:6px;border-radius:3px;background:var(--border-light);overflow:hidden}
.pipe-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#06b6d4,#8b5cf6)}
.pipe-sub{font-size:9px;color:var(--text-faint);margin-top:4px}

.kanban-wrap{margin-bottom:20px}
.kanban-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.kanban-filter{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text-muted);font-family:var(--font)}
.kanban-filter.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-add{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--purple);background:var(--purple);color:#fff;cursor:pointer;font-family:var(--font);margin-left:auto}
.btn-add:hover{background:var(--purple-light)}
.kanban-cols{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.k-col{background:var(--bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:10px;min-height:200px}
.k-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border-light)}
.k-col-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.col-backlog .k-col-name{color:var(--text-muted)}
.col-high .k-col-name{color:var(--high)}
.col-progress .k-col-name{color:var(--amber)}
.col-review .k-col-name{color:var(--blue)}
.col-done .k-col-name{color:var(--green)}
.k-count{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px}
.col-backlog .k-count{background:var(--border-light);color:var(--text-faint)}
.col-high .k-count{background:var(--high-bg);color:var(--high)}
.col-progress .k-count{background:var(--amber-bg);color:var(--amber)}
.col-review .k-count{background:var(--blue-bg);color:var(--blue)}
.col-done .k-count{background:var(--done-bg);color:var(--done)}

.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px;margin-bottom:6px;cursor:grab;transition:box-shadow .15s,transform .15s}
.task-card:hover{box-shadow:0 4px 12px rgba(80,64,160,.12);transform:translateY(-1px)}
.task-card:active{cursor:grabbing}
.task-card.done-card{opacity:.7}
.task-card.done-card .task-text{text-decoration:line-through;color:var(--text-faint)}
.task-badge{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.badge-HIGH{background:var(--high-bg);color:var(--high);border:1px solid var(--high-border)}
.badge-MED{background:var(--med-bg);color:var(--med);border:1px solid var(--med-border)}
.badge-EXPLORE{background:var(--explore-bg);color:var(--explore);border:1px solid var(--explore-border)}
.badge-REVIEW{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-DONE{background:var(--done-bg);color:var(--done);border:1px solid var(--done-border)}
.task-text{font-size:11px;color:var(--text);line-height:1.4}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:6px}
.task-sprint{font-size:9px;color:var(--text-faint);font-family:var(--mono)}
.task-expand{font-size:9px;color:var(--purple);cursor:pointer;margin-left:auto}
.task-expand:hover{text-decoration:underline}
.task-detail{display:none;font-size:10px;color:var(--text-muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border-light);line-height:1.5}
.task-detail.open{display:block}
.sortable-ghost{opacity:.3;background:var(--purple-pale);border:2px dashed var(--purple)}
.sortable-drag{box-shadow:0 8px 24px rgba(80,64,160,.2)}

.slack-cols{display:grid;grid-template-columns:1fr 1fr 1fr 300px;gap:10px;margin-bottom:20px}
.slack-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.slack-header{font-size:10px;font-weight:700;padding-bottom:8px;border-bottom:1px solid var(--border-light);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.slack-header.builds{color:var(--purple)}
.slack-header.intel{color:var(--green)}
.slack-header.content{color:var(--blue)}
.slack-msg{padding:6px 0;border-bottom:1px solid var(--border-light)}
.slack-msg:last-child{border-bottom:none}
.slack-sender{font-size:9px;font-weight:600;color:var(--text-muted);margin-bottom:2px}
.slack-text{font-size:10px;color:var(--text);line-height:1.4}
.slack-time{font-size:9px;color:var(--text-faint);font-family:var(--mono);margin-top:2px}

.intel-item{padding:7px 0;border-bottom:1px solid var(--border-light);display:flex;gap:8px}
.intel-item:last-child{border-bottom:none}
.intel-tag{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700;white-space:nowrap;flex-shrink:0;height:fit-content;margin-top:1px}
.tag-MEDIA{background:#e8fff0;color:var(--green);border:1px solid var(--green-border)}
.tag-EDGAR{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.tag-TMDB{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.tag-LINKEDIN{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.tag-TECH{background:var(--purple-pale);color:var(--purple);border:1px solid var(--border)}
.intel-text{font-size:11px;color:var(--text);line-height:1.4;flex:1}
.intel-time{font-size:9px;color:var(--text-faint);font-family:var(--mono);white-space:nowrap}

.done-item{padding:9px 0;border-bottom:1px solid var(--border-light)}
.done-item:last-child{border-bottom:none}
.done-header{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.done-title{font-size:12px;font-weight:600;color:var(--text)}
.done-date{font-size:10px;color:var(--text-faint);font-family:var(--mono);margin-left:auto}
.done-desc{font-size:10px;color:var(--text-muted);line-height:1.4}

.target-empty{padding:20px;text-align:center;color:var(--text-faint);font-size:11px;font-family:var(--mono)}
.t10-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.t10-row:last-child{border-bottom:none}
.t10-num{font-size:11px;font-weight:700;color:var(--text-faint);width:18px;flex-shrink:0;margin-top:1px}
.t10-name{font-size:12px;font-weight:600;color:var(--text)}
.t10-co{font-size:10px;color:var(--text-muted)}

.footer{text-align:center;padding:20px;font-size:10px;color:var(--text-faint);border-top:1px solid var(--border);margin-top:8px}
.footer a{color:var(--purple);text-decoration:none}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,24,48,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:12px;padding:24px;width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(80,64,160,.2)}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px}
.modal input,.modal select,.modal textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:var(--font);font-size:12px;color:var(--text);margin-bottom:10px;background:var(--bg)}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:2px solid var(--purple);border-color:var(--purple)}
.modal textarea{height:80px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-cancel{padding:7px 16px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;font-family:var(--font);color:var(--text-muted)}
.btn-save{padding:7px 16px;border-radius:6px;border:none;background:var(--purple);color:#fff;cursor:pointer;font-family:var(--font);font-weight:600}
.empty{padding:16px;text-align:center;color:var(--text-faint);font-size:11px;font-family:var(--mono)}
</style>
</head>
<body>

<div class="header">
  <div class="brand">SaS<span>MaS</span>TeR</div>
  <div class="status-pills" id="status-pills">
    <span class="pill gray"><span class="dot"></span>Loading…</span>
  </div>
  <div class="header-right" id="clock">--</div>
</div>

<div id="alert-container"></div>

<div class="page">
  <div id="kpi-row"></div>
  <div id="debrief-section"></div>
  <div class="section-title">Build Activity</div>
  <div class="two-col" id="heatmap-agents"></div>
  <div class="section-title">Project Board — Interactive Kanban</div>
  <div class="kanban-wrap">
    <div class="kanban-toolbar">
      <button class="kanban-filter active" onclick="filterKanban('all',this)">All</button>
      <button class="kanban-filter" onclick="filterKanban('HIGH',this)">HIGH</button>
      <button class="kanban-filter" onclick="filterKanban('MED',this)">MED</button>
      <button class="kanban-filter" onclick="filterKanban('EXPLORE',this)">EXPLORE</button>
      <button class="btn-add" onclick="openModal()">+ Add Task</button>
    </div>
    <div class="kanban-cols">
      <div class="k-col col-backlog" id="col-backlog">
        <div class="k-col-header"><span class="k-col-name">Backlog</span><span class="k-count" id="cnt-backlog">—</span></div>
      </div>
      <div class="k-col col-high" id="col-high">
        <div class="k-col-header"><span class="k-col-name">High Priority</span><span class="k-count" id="cnt-high">—</span></div>
      </div>
      <div class="k-col col-progress" id="col-progress">
        <div class="k-col-header"><span class="k-col-name">In Progress</span><span class="k-count" id="cnt-progress">—</span></div>
      </div>
      <div class="k-col col-review" id="col-review">
        <div class="k-col-header"><span class="k-col-name">Review</span><span class="k-count" id="cnt-review">—</span></div>
      </div>
      <div class="k-col col-done" id="col-done">
        <div class="k-col-header"><span class="k-col-name">Done</span><span class="k-count" id="cnt-done">—</span></div>
      </div>
    </div>
  </div>
  <div class="section-title">Live Activity — 3 Channels + Intelligence Feed</div>
  <div id="slack-intel"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px" id="done-target"></div>
  <div class="footer">SaSMaster · Bloomberg Terminal for Media · <a href="https://github.com/sas411/sasmaster-status" target="_blank">GitHub</a> · Auto-deploys on every build · <span id="footer-time"></span></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Add Task to Queue</div>
    <select id="taskPriority"><option>HIGH</option><option>MED</option><option>EXPLORE</option></select>
    <input type="text" id="taskText" placeholder="Task description…" />
    <textarea id="taskDetail" placeholder="Additional context (optional)…"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addLocalTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
const STATUS_URL = 'https://raw.githubusercontent.com/sas411/sasmaster-status/main/status.json';
let activeFilter = 'all';
let kanbanData = { backlog:[], high:[], progress:[], review:[], done:[] };
let localTasks = JSON.parse(localStorage.getItem('sm-local-tasks') || '[]');

// ── CLOCK ──────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  let h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent =
    `${days[n.getDay()]} ${months[n.getMonth()]} ${n.getDate()} · ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ap}`;
}
tick(); setInterval(tick, 1000);

// ── TIME AGO ───────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

// ── STATUS PILLS ───────────────────────────────────────────────
function buildPills(data) {
  const alive = data.system?.jarvis?.alive !== false;
  const high = data.queue?.high || 0;
  const agents = (data.agents || []).filter(a => a.status === 'healthy').length;
  const total = (data.agents || []).length;
  const tmdb = data.tmdb_progress;
  const pills = [
    `<span class="pill ${alive ? 'online' : 'red'}"><span class="dot"></span>JARVIS ${alive ? 'Online' : 'Offline'}</span>`,
    `<span class="pill ${high > 0 ? 'amber' : 'online'}"><span class="dot"></span>${high} HIGH Tasks</span>`,
    `<span class="pill online"><span class="dot"></span>${agents}/${total} Agents OK</span>`,
  ];
  if (tmdb && tmdb.running) {
    pills.push(`<span class="pill amber"><span class="dot"></span>TMDB ${tmdb.pct || 0}% Loading</span>`);
  }
  pills.push(`<span class="pill gray">Updated ${timeAgo(data.generated)}</span>`);
  document.getElementById('status-pills').innerHTML = pills.join('');
}

// ── ALERT BANNERS ──────────────────────────────────────────────
function buildAlerts(alerts) {
  if (!alerts || !alerts.length) { document.getElementById('alert-container').innerHTML = ''; return; }
  document.getElementById('alert-container').innerHTML = alerts.map((a, i) => `
    <div class="alert-banner ${a.level || 'warning'}" id="alert-${i}">
      <span class="alert-icon">${a.icon || '⚠️'}</span>
      <span class="alert-msg">${a.message}<span class="alert-detail"> ${a.detail || ''}</span></span>
      <button class="alert-dismiss" onclick="document.getElementById('alert-${i}').remove()">✕</button>
    </div>`).join('');
}

// ── KPI CARDS ──────────────────────────────────────────────────
function buildKpis(data) {
  const alive = data.system?.jarvis?.alive !== false;
  const high = data.queue?.high || 0;

  const tmdb = data.tmdb_progress;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card jarvis">
        <div class="kpi-label">JARVIS</div>
        <div class="kpi-val">${alive ? 'Online' : 'Offline'}</div>
        <div class="kpi-sub">Socket Mode · MacBook Pro M1</div>
        <span class="kpi-badge ${alive ? 'online' : 'offline'}"><span class="dot"></span> ${alive ? 'Live' : 'Down'}</span>
      </div>
      <div class="kpi-card queue">
        <div class="kpi-label">High Queue</div>
        <div class="kpi-val">${high}</div>
        <div class="kpi-sub">tasks pending execution</div>
        <span class="kpi-badge building">Building Tonight</span>
      </div>
      <div class="kpi-card agents">
        <div class="kpi-label">Active Agents</div>
        <div class="kpi-val">${agents.length}</div>
        <div class="kpi-sub">of ${agents.length} scheduled</div>
        <span class="kpi-badge live">Fleet Online</span>
      </div>
      <div class="kpi-card market">
        <div class="kpi-label">Market Opportunity</div>
        <div class="kpi-val">$279B</div>
        <div class="kpi-sub">content exchanged annually</div>
        <span class="kpi-badge live">Bloomberg for Media</span>
      </div>
      <div class="kpi-card pipeline">
        <div class="kpi-label">TMDB Pipeline</div>
        <div class="kpi-val">${tmdb ? 'PHASE ' + (tmdb.phase || 1) + '/3' : 'STANDBY'}</div>
        <div class="kpi-sub">${tmdb ? (tmdb.complete || 0).toLocaleString() + ' / ' + (tmdb.total || 0).toLocaleString() + ' titles → S3' : 'Next run: 12AM nightly'}</div>
        <span class="kpi-badge building">${tmdb ? (tmdb.pct || 0) + '% Complete' : 'Scheduled'}</span>
      </div>
    </div>`;
}

// ── DEBRIEF ────────────────────────────────────────────────────
function buildDebrief(debrief) {
  if (!debrief) { document.getElementById('debrief-section').innerHTML = ''; return; }
  const ran = (debrief.ran || []).map(r => `
    <tr>
      <td class="time">${r.time || ''}</td>
      <td class="agent">${r.agent || ''}</td>
      <td class="result">${r.result || ''} <span class="status-tag tag-ok">OK</span></td>
    </tr>`).join('');
  const failed = (debrief.failed || []).map(f => `
    <tr>
      <td class="time">${f.time || ''}</td>
      <td class="agent">${f.agent || ''}</td>
      <td class="result">${f.reason || ''} <span class="status-tag tag-fail">FAIL</span></td>
    </tr>`).join('');
  document.getElementById('debrief-section').innerHTML = `
    <div class="section-title">Overnight Debrief</div>
    <div class="debrief">
      <div class="debrief-panel ran">
        <div class="debrief-header ok">✅ What Ran</div>
        <table class="debrief-table">
          <tr><th>Time</th><th>Agent</th><th>Result</th></tr>
          ${ran || '<tr><td colspan="3" style="color:var(--text-faint);padding:8px 6px">No data yet</td></tr>'}
        </table>
      </div>
      <div class="debrief-panel failed">
        <div class="debrief-header fail">❌ What Failed</div>
        <table class="debrief-table">
          <tr><th>Time</th><th>Agent</th><th>Reason</th></tr>
          ${failed || '<tr><td colspan="3" style="color:var(--green);padding:8px 6px">All clear ✓</td></tr>'}
        </table>
      </div>
    </div>`;
}

// ── HEATMAP ────────────────────────────────────────────────────
function buildHeatmap(heatmap) {
  const today = new Date();
  const cells = [];
  for (let i = 27; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const count = heatmap[key] || 0;
    const lvl = count === 0 ? 0 : count === 1 ? 1 : count === 2 ? 2 : count <= 4 ? 3 : 4;
    cells.push(`<div class="hm-cell${lvl ? ' l'+lvl : ''}" title="${key}: ${count} build(s)"></div>`);
  }
  const startDate = new Date(today); startDate.setDate(startDate.getDate() - 27);
  const fmt = d => d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  return `
    <div class="heatmap-grid">${cells.join('')}</div>
    <div class="hm-labels"><span>${fmt(startDate)}</span><span>Today</span></div>
    <div style="display:flex;align-items:center;gap:4px;margin-top:8px;font-size:9px;color:var(--text-faint)">
      Less
      <span style="width:10px;height:10px;border-radius:2px;background:var(--border-light);display:inline-block"></span>
      <span style="width:10px;height:10px;border-radius:2px;background:#d8d0f8;display:inline-block"></span>
      <span style="width:10px;height:10px;border-radius:2px;background:#8060e0;display:inline-block"></span>
      <span style="width:10px;height:10px;border-radius:2px;background:#5040c0;display:inline-block"></span>
      More
    </div>`;
}

// ── AGENT FLEET ────────────────────────────────────────────────
function buildAgentFleet(agents, tmdb) {
  if (!agents.length) return '<div class="empty">No agents configured</div>';
  return agents.map(a => {
    const statusCls = a.status === 'healthy' ? 's-ok' : a.status === 'error' ? 's-error' : 's-pending';
    const statusTxt = a.status === 'healthy' ? 'OK' : a.status === 'error' ? 'ERR' : 'PEND';
    const barPct = a.status === 'healthy' ? 100 : a.status === 'error' ? 20 : 50;
    const lastRunTxt = a.lastRun ? timeAgo(a.lastRun) : 'never';
    const isTmdb = /tmdb/i.test(a.name);
    return `
      <div class="agent-row">
        <div class="agent-icon">${a.icon || '🤖'}</div>
        <div class="agent-info">
          <div class="agent-name">${a.name}</div>
          <div class="agent-schedule">${a.schedule} · ${lastRunTxt}</div>
          ${isTmdb && tmdb && tmdb.running
            ? `<div class="pipe-progress">
                <div class="pipe-header"><span class="pipe-label">TMDB Bulk Load — Phase ${tmdb.phase || 1}/3</span><span class="pipe-pct">${tmdb.pct || 0}%</span></div>
                <div class="pipe-track"><div class="pipe-fill" style="width:${tmdb.pct || 0}%"></div></div>
                <div class="pipe-sub">${(tmdb.complete || 0).toLocaleString()} / ${(tmdb.total || 0).toLocaleString()} · ${tmdb.s3_path || ''}</div>
              </div>`
            : `<div class="agent-bar"><div class="agent-fill" style="width:${barPct}%"></div></div>`}
        </div>
        <span class="agent-status ${statusCls}">${statusTxt}</span>
      </div>`;
  }).join('');
}

// ── HEATMAP + AGENTS SECTION ───────────────────────────────────
function buildHeatmapAgents(data) {
  const heatmap = data.heatmap || {};
  const agents = data.agents || [];
  const tmdb = data.tmdb_progress || null;
  const total = Object.values(heatmap).reduce((s, v) => s + v, 0);
  document.getElementById('heatmap-agents').innerHTML = `
    <div class="panel">
      <div class="panel-title">Build Heatmap — 28 Days <span class="panel-badge">${total} LOGGED</span></div>
      ${buildHeatmap(heatmap)}
    </div>
    <div class="panel">
      <div class="panel-title">Agent Fleet <span class="panel-badge">${agents.length} AGENTS</span></div>
      ${buildAgentFleet(agents, tmdb)}
    </div>`;
}

// ── KANBAN ─────────────────────────────────────────────────────
function makeCard(task) {
  const card = document.createElement('div');
  card.className = 'task-card' + (task.done ? ' done-card' : '');
  card.dataset.id = task.id;
  card.dataset.priority = task.priority || 'MED';
  const badge = task.priority || 'MED';
  const sprint = task.sprint || '';
  const full = task.full || task.text || '';
  const isExpanded = full && full !== task.text;
  card.innerHTML = `
    <span class="task-badge badge-${badge}">${badge}</span>
    <div class="task-text">${task.text || ''}</div>
    <div class="task-meta">
      <span class="task-sprint">${sprint}</span>
      ${isExpanded ? `<span class="task-expand" onclick="toggleDetail(event,this)">▼ more</span>` : ''}
    </div>
    ${isExpanded ? `<div class="task-detail">${full}</div>` : ''}`;
  if (activeFilter !== 'all' && (task.priority || 'MED') !== activeFilter) card.style.display = 'none';
  return card;
}

function populateColumn(colId, cntId, items) {
  const el = document.getElementById(colId);
  const header = el.querySelector('.k-col-header');
  el.innerHTML = '';
  el.appendChild(header);
  items.forEach(t => el.appendChild(makeCard(t)));
  const cnt = document.getElementById(cntId);
  if (cnt) cnt.textContent = items.length;
}

function buildKanban(data) {
  const kanban = data.kanban || {};
  const queue = data.queue || {};
  const builds = data.recentBuilds || [];

  // In-progress from localStorage
  const inProgressIds = new Set(JSON.parse(localStorage.getItem('sm-inprogress') || '[]'));

  // HIGH column: highItems from queue, minus those moved to in-progress
  const highItems = (queue.highItems || []).map(i => typeof i === 'object' ? i : { id: String(i), text: i, priority: 'HIGH' });
  const highQueued = highItems.filter(t => !inProgressIds.has(t.id));
  const inProgress = highItems.filter(t => inProgressIds.has(t.id));

  // Backlog: med + explore
  const backlogItems = [...(kanban.backlog || [])];

  // Review: pending approvals
  const reviewItems = kanban.review || [];

  // Done: recent builds
  const doneItems = (kanban.done || builds.slice(0, 5).map((b, i) => ({
    id: `done-${i}`, text: b.task || b.text, priority: 'DONE', done: true, sprint: ''
  })));

  // Local tasks injected into backlog
  localTasks.forEach(t => backlogItems.unshift(t));

  kanbanData = { backlog: backlogItems, high: highQueued, progress: inProgress, review: reviewItems, done: doneItems };

  populateColumn('col-backlog', 'cnt-backlog', backlogItems);
  populateColumn('col-high', 'cnt-high', highQueued);
  populateColumn('col-progress', 'cnt-progress', inProgress);
  populateColumn('col-review', 'cnt-review', reviewItems);
  populateColumn('col-done', 'cnt-done', doneItems);

  initSortable();
}

let sortableInited = false;
function initSortable() {
  if (sortableInited) return;
  sortableInited = true;
  ['backlog', 'high', 'progress', 'review', 'done'].forEach(col => {
    Sortable.create(document.getElementById('col-' + col), {
      group: 'kanban', animation: 150,
      ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
      filter: '.k-col-header',
      onEnd(evt) {
        const fromCol = evt.from.id.replace('col-', '');
        const toCol = evt.to.id.replace('col-', '');
        if (fromCol === toCol) return;
        const id = evt.item.dataset.id;
        const fromArr = kanbanData[fromCol];
        const idx = fromArr.findIndex(t => t.id === id);
        if (idx > -1) {
          const [t] = fromArr.splice(idx, 1);
          kanbanData[toCol].splice(evt.newIndex, 0, t);
        }
        // Persist in-progress
        const ip = kanbanData.progress.map(t => t.id);
        localStorage.setItem('sm-inprogress', JSON.stringify(ip));
        updateCounts();
      }
    });
  });
}

function updateCounts() {
  ['backlog','high','progress','review','done'].forEach(col => {
    const cnt = document.getElementById('cnt-' + col);
    if (cnt) cnt.textContent = kanbanData[col].length;
  });
}

function toggleDetail(e, el) {
  e.stopPropagation();
  const detail = el.closest('.task-card').querySelector('.task-detail');
  if (!detail) return;
  detail.classList.toggle('open');
  el.textContent = detail.classList.contains('open') ? '▲ less' : '▼ more';
}

function filterKanban(priority, btn) {
  activeFilter = priority;
  document.querySelectorAll('.kanban-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.task-card').forEach(c => {
    c.style.display = (priority === 'all' || c.dataset.priority === priority) ? '' : 'none';
  });
}

function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('taskText').focus(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function addLocalTask() {
  const priority = document.getElementById('taskPriority').value;
  const text = document.getElementById('taskText').value.trim();
  const detail = document.getElementById('taskDetail').value.trim();
  if (!text) return;
  const task = { id: 't' + Date.now(), priority, text, full: detail || text, sprint: 'Local', done: false };
  localTasks.unshift(task);
  localStorage.setItem('sm-local-tasks', JSON.stringify(localTasks));
  if (window.SM_LAST_DATA) buildKanban(window.SM_LAST_DATA);
  closeModal();
  document.getElementById('taskText').value = '';
  document.getElementById('taskDetail').value = '';
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ── SLACK + INTEL ──────────────────────────────────────────────
function buildSlackIntel(data) {
  const slackFeed = data.slack_feed || {};
  const intelFeed = data.intel_feed || [];
  const builds = slackFeed.builds || [];
  const intel = slackFeed.intel || [];
  const content = slackFeed.content || [];

  const tagMap = { 'MEDIA INTEL': 'tag-MEDIA', 'SEC EDGAR': 'tag-EDGAR', 'TMDB': 'tag-TMDB', 'LINKEDIN': 'tag-LINKEDIN', 'TECH': 'tag-TECH' };

  const renderMsgs = msgs => msgs.length
    ? msgs.map(m => `<div class="slack-msg"><div class="slack-sender">${m.sender || 'Bot'} · ${m.time || ''}</div><div class="slack-text">${m.text || ''}</div></div>`).join('')
    : '<div class="slack-msg"><div class="slack-text" style="color:var(--text-faint)">No messages yet</div></div>';

  const renderIntel = items => items.length
    ? items.map(item => `<div class="intel-item"><span class="intel-tag ${tagMap[item.source] || 'tag-TECH'}">${item.source || 'INTEL'}</span><div><div class="intel-text">${item.text || ''}</div><div class="intel-time">${item.ts ? timeAgo(item.ts) : ''}</div></div></div>`).join('')
    : '<div class="empty">No signals yet — agents populate this</div>';

  document.getElementById('slack-intel').innerHTML = `
    <div class="slack-cols">
      <div class="slack-panel">
        <div class="slack-header builds"># sasmaster-builds</div>
        ${renderMsgs(builds)}
      </div>
      <div class="slack-panel">
        <div class="slack-header intel"># sasmaster-intel</div>
        ${renderMsgs(intel)}
      </div>
      <div class="slack-panel">
        <div class="slack-header content"># sasmaster-content</div>
        ${renderMsgs(content)}
      </div>
      <div class="panel" style="margin-bottom:0">
        <div class="panel-title">Intelligence Feed <span class="panel-badge">LIVE</span></div>
        ${renderIntel(intelFeed)}
      </div>
    </div>`;
}

// ── DONE LOG + TARGET 10 ───────────────────────────────────────
function buildDoneTarget(data) {
  const builds = data.recentBuilds || [];
  const target10 = data.target10 || [];

  const doneHtml = builds.length
    ? builds.map(b => `
        <div class="done-item">
          <div class="done-header">
            <span class="status-tag tag-ok">DONE</span>
            <span class="done-title">${b.task || ''}</span>
            <span class="done-date">${(b.date || '').slice(0, 10)}</span>
          </div>
          ${b.notes ? `<div class="done-desc">${b.notes}</div>` : ''}
        </div>`).join('')
    : '<div class="empty">No builds logged yet</div>';

  const targetHtml = target10.length
    ? target10.map((t, i) => `
        <div class="t10-row">
          <div class="t10-num">${i + 1}</div>
          <div><div class="t10-name">${t.name || ''}</div><div class="t10-co">${t.title ? t.title + ' · ' : ''}${t.company || ''}</div></div>
        </div>`).join('')
    : '<div class="target-empty">No targets yet — run: <code>sm target add &lt;name&gt; &lt;company&gt;</code></div>';

  document.getElementById('done-target').innerHTML = `
    <div class="panel">
      <div class="panel-title">Done Log — Recent <span class="panel-badge">${builds.length} RECENT</span></div>
      ${doneHtml}
    </div>
    <div class="panel">
      <div class="panel-title">Target 10 — Relationship Pipeline <span class="panel-badge">${target10.length}/10 IDENTIFIED</span></div>
      ${targetHtml}
    </div>`;
}

// ── FOOTER ─────────────────────────────────────────────────────
function updateFooter() {
  document.getElementById('footer-time').textContent =
    new Date().toLocaleString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) + ' ET';
}

// ── MAIN RENDER ────────────────────────────────────────────────
function render(data) {
  window.SM_LAST_DATA = data;
  sortableInited = false; // allow re-init on full render
  buildPills(data);
  buildAlerts(data.alerts || []);
  buildKpis(data);
  buildDebrief(data.overnight_debrief || null);
  buildHeatmapAgents(data);
  buildKanban(data);
  buildSlackIntel(data);
  buildDoneTarget(data);
  updateFooter();
}

// ── FETCH LOOP ─────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const res = await fetch(STATUS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    render(data);
  } catch (e) {
    console.warn('Status fetch failed:', e);
    document.getElementById('status-pills').innerHTML =
      '<span class="pill red"><span class="dot"></span>Fetch error — retrying</span>';
  }
}

fetchStatus();
setInterval(fetchStatus, 60000);

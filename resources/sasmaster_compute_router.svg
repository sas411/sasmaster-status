<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Plus Jakarta Sans',system-ui,sans-serif">
<title id="t">SaSMaster compute optimization router — four tiers, one job each</title>
<desc id="d">Four compute tiers each with one job: Railway for always-on availability, the 64GB M1 Mac for throughput, GitHub Actions for burst and failover, and Claude models for reasoning metered by a cost governor. A presence chain (Mac emits mac:last_ok to Upstash, read via a Railway endpoint) feeds a router that sends each task to the cheapest tier a human can supervise. Local inference on the Mac is the biggest unused lever. A reliability gap: launchd does not fire while the Mac sleeps.</desc>
<defs>
<style>
 .k{font-size:12px;font-weight:800;letter-spacing:3px;fill:#7C3AED}
 .h1{font-size:26px;font-weight:800;fill:#1F1B33}
 .sub{font-size:12.5px;font-weight:600;fill:#5A5470}
 .th{font-size:13px;font-weight:800;fill:#fff}
 .tj{font-size:9.5px;font-weight:800;fill:#fff;opacity:.9;letter-spacing:1px}
 .tb{font-size:10px;fill:#3a3550}
 .pill{font-size:11px;font-weight:700;font-family:'Share Tech Mono',monospace;fill:#4C1D95}
 .lcap{font-size:12px;font-weight:800;fill:#fff}
 .lbody{font-size:11px;fill:#2c2740}
 .al{font-size:9px;font-weight:800;font-family:'Share Tech Mono',monospace;fill:#7C3AED}
 .chip{font-size:9.5px;font-weight:700;font-family:'Share Tech Mono',monospace}
</style>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7C3AED"/></marker>
</defs>
<rect x="0" y="0" width="1000" height="720" rx="16" fill="#FAF7FF"/>
<rect x="1" y="1" width="998" height="718" rx="15" fill="none" stroke="#E5DCFF" stroke-width="2"/>
<text x="40" y="40" class="k">COMPUTE OPTIMIZATION</text>
<text x="40" y="68" class="h1">The Router — four tiers, one job each</text>
<text x="40" y="88" class="sub">Route each task to the <tspan font-weight="800" fill="#4C1D95">cheapest tier that can do it — while a human is present to catch failures.</tspan></text>

<!-- TIER CARDS -->
<g>
<!-- railway -->
<rect x="40" y="104" width="218" height="120" rx="11" fill="#fff" stroke="#D6C9Fb"/>
<path d="M40,104 h218 v26 H40 Z" fill="#7C3AED"/><rect x="40" y="118" width="218" height="12" fill="#7C3AED"/>
<text x="54" y="122" class="th">RAILWAY</text><text x="244" y="122" text-anchor="end" class="tj">AVAILABILITY</text>
<text x="54" y="150" class="tb">always-on · tiny footprint</text>
<text x="54" y="167" class="tb">control plane + heartbeat watcher</text>
<text x="54" y="184" class="tb">never sleeps</text>
<rect x="54" y="194" width="150" height="20" rx="5" fill="#EEEAFB"/><text x="60" y="208" class="chip" fill="#4C1D95">fixed · small $</text>
<!-- mac -->
<rect x="272" y="104" width="218" height="120" rx="11" fill="#fff" stroke="#bde6d6"/>
<path d="M272,104 h218 v26 H272 Z" fill="#059669"/><rect x="272" y="118" width="218" height="12" fill="#059669"/>
<text x="286" y="122" class="th">MAC M1 · 64GB</text><text x="476" y="122" text-anchor="end" class="tj">THROUGHPUT</text>
<text x="286" y="150" class="tb">DuckDB joins · fusion · scraping</text>
<text x="286" y="167" class="tb">local inference · fast + FREE</text>
<text x="286" y="184" class="tb">only reliable when awake</text>
<rect x="286" y="194" width="180" height="20" rx="5" fill="#ECFDF5"/><text x="292" y="208" class="chip" fill="#059669">$0 · off-governor</text>
<!-- gha -->
<rect x="504" y="104" width="218" height="120" rx="11" fill="#fff" stroke="#f2dcb4"/>
<path d="M504,104 h218 v26 H504 Z" fill="#B45309"/><rect x="504" y="118" width="218" height="12" fill="#B45309"/>
<text x="518" y="122" class="th">GITHUB ACTIONS</text><text x="708" y="122" text-anchor="end" class="tj">BURST / FAILOVER</text>
<text x="518" y="150" class="tb">ephemeral · parallel</text>
<text x="518" y="167" class="tb">different host (Mac-independent)</text>
<text x="518" y="184" class="tb">backup heartbeat watcher</text>
<rect x="518" y="194" width="170" height="20" rx="5" fill="#FEF6E7"/><text x="524" y="208" class="chip" fill="#B45309">free minutes · cron */10</text>
<!-- claude -->
<rect x="736" y="104" width="224" height="120" rx="11" fill="#fff" stroke="#D6C9Fb"/>
<path d="M736,104 h224 v26 H736 Z" fill="#4C1D95"/><rect x="736" y="118" width="224" height="12" fill="#4C1D95"/>
<text x="750" y="122" class="th">CLAUDE MODELS</text><text x="946" y="122" text-anchor="end" class="tj">REASONING</text>
<text x="750" y="150" class="tb">opus · sonnet · haiku by effort</text>
<text x="750" y="167" class="tb">the genuinely hard thinking</text>
<text x="750" y="184" class="tb">metered by the cost governor</text>
<rect x="750" y="194" width="190" height="20" rx="5" fill="#EEEAFB"/><text x="756" y="208" class="chip" fill="#4C1D95">$/token · governed</text>
</g>

<!-- PRESENCE CHAIN -->
<text x="40" y="258" class="k" style="font-size:10px">PRESENCE</text>
<g>
<rect x="40" y="266" width="178" height="40" rx="9" fill="#fff" stroke="#bde6d6"/><text x="129" y="284" text-anchor="middle" style="font-size:12px;font-weight:800;fill:#059669">💻 Mac · awake?</text><text x="129" y="298" text-anchor="middle" style="font-size:9px;fill:#5A5470;font-family:'Share Tech Mono',monospace">launchd / Mac Worker</text>
<line x1="218" y1="286" x2="270" y2="286" stroke="#7C3AED" stroke-width="2" marker-end="url(#a)"/><text x="244" y="278" text-anchor="middle" class="al">60s</text>
<rect x="272" y="266" width="214" height="40" rx="9" fill="#fff" stroke="#E5DCFF"/><text x="379" y="284" text-anchor="middle" style="font-size:12px;font-weight:800;fill:#4C1D95">Upstash · SETEX</text><text x="379" y="298" text-anchor="middle" style="font-size:9px;fill:#5A5470;font-family:'Share Tech Mono',monospace">mac:last_ok · TTL 180s</text>
<line x1="486" y1="286" x2="538" y2="286" stroke="#7C3AED" stroke-width="2" marker-end="url(#a)"/><text x="512" y="278" text-anchor="middle" class="al">read</text>
<rect x="540" y="266" width="238" height="40" rx="9" fill="#fff" stroke="#E5DCFF"/><text x="659" y="284" text-anchor="middle" style="font-size:12px;font-weight:800;fill:#4C1D95">Railway · /compute/presence</text><text x="659" y="298" text-anchor="middle" style="font-size:9px;fill:#5A5470;font-family:'Share Tech Mono',monospace">{online | offline · age}</text>
</g>
<!-- presence -> router -->
<path d="M778,286 H862 V332" fill="none" stroke="#7C3AED" stroke-width="2" marker-end="url(#a)"/>

<!-- ROUTER -->
<rect x="330" y="330" width="540" height="66" rx="12" fill="#2A1163" stroke="#4C1D95"/>
<text x="600" y="356" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#fff;letter-spacing:.5px">COMPUTE ROUTER</text>
<text x="600" y="378" text-anchor="middle" style="font-size:10.5px;fill:#C7B8FF">reads presence + routing table → dispatch to the cheapest tier a human can supervise</text>

<!-- branch connectors -->
<path d="M450,396 C400,440 120,420 38,444" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#a)"/>
<path d="M600,396 V440" fill="none" stroke="#7C3AED" stroke-width="2" marker-end="url(#a)"/>
<path d="M760,396 C820,440 980,430 962,496" fill="none" stroke="#4C1D95" stroke-width="2" marker-end="url(#a)" opacity="0"/>

<!-- LANES -->
<!-- lane1 -->
<g>
<rect x="40" y="446" width="920" height="44" rx="10" fill="#ECFDF5" stroke="#bde6d6"/>
<rect x="40" y="446" width="186" height="44" rx="10" fill="#059669"/><rect x="200" y="446" width="26" height="44" fill="#059669"/>
<text x="52" y="466" class="lcap">WHEN ONLINE</text><text x="52" y="481" style="font-size:10px;font-weight:700;fill:#d1fae5;font-family:'Share Tech Mono',monospace">→ SATURATE MAC</text>
<text x="240" y="466" class="lbody"><tspan font-weight="800">Throughput muscle:</tspan> DuckDB Parent-Key joins · fusion passes · 11 scrapers in parallel · local inference</text>
<text x="240" y="482" class="lbody" fill="#047857">cheapest fast compute you own — no API cost, off the governor, 64GB unified memory. When you're here to catch failures, keep it busy.</text>
</g>
<!-- lane2 -->
<g>
<rect x="40" y="498" width="920" height="44" rx="10" fill="#F4F1FF" stroke="#D6C9Fb"/>
<rect x="40" y="498" width="186" height="44" rx="10" fill="#7C3AED"/><rect x="200" y="498" width="26" height="44" fill="#7C3AED"/>
<text x="52" y="518" class="lcap">ALWAYS-ON</text><text x="52" y="533" style="font-size:10px;font-weight:700;fill:#E4DCFF;font-family:'Share Tech Mono',monospace">→ RAILWAY + GHA</text>
<text x="240" y="518" class="lbody"><tspan font-weight="800">Schedule-critical + watchers:</tspan> 5A brief · 6A intel · 7A/2P score · Fri tech · heartbeat dead-man watcher</text>
<text x="240" y="534" class="lbody" fill="#5b3aa6">fires regardless of Mac state. When you go offline, this still runs and the Mac drains its muscle queue on next wake.</text>
</g>
<!-- lane3 -->
<g>
<rect x="40" y="550" width="920" height="44" rx="10" fill="#EEEAFB" stroke="#D6C9Fb"/>
<rect x="40" y="550" width="186" height="44" rx="10" fill="#4C1D95"/><rect x="200" y="550" width="26" height="44" fill="#4C1D95"/>
<text x="52" y="570" class="lcap">REASONING</text><text x="52" y="585" style="font-size:10px;font-weight:700;fill:#C7B8FF;font-family:'Share Tech Mono',monospace">→ CLAUDE (metered)</text>
<text x="240" y="570" class="lbody"><tspan font-weight="800">Only the hard thinking:</tspan> opus / sonnet / haiku by effort · metered by the cost governor</text>
<text x="240" y="586" class="lbody" fill="#4C1D95">governor tiers: warn $15 · fallback $25 · pause $40 (human resume). Reserve this budget for what genuinely needs reasoning.</text>
</g>

<!-- LEVER strip -->
<rect x="40" y="606" width="920" height="56" rx="11" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
<text x="56" y="628" style="font-size:12px;font-weight:800;fill:#047857">⚡ BIGGEST UNUSED LEVER · LOCAL INFERENCE (MLX / Ollama on 64GB M1 — quantized to ~70B)</text>
<text x="56" y="646" style="font-size:10.5px;fill:#0d5a44">Move cheap, mechanical jobs OFF the API → free + off-governor: embeddings for entity resolution · corroboration guard (TMDB-SEARCH-MATCH) · dedup · field cleaning · 0.80-tier first-pass scoring</text>
<g class="chip">
<rect x="640" y="650" width="100" height="0" fill="none"/>
</g>

<!-- WARNING band -->
<rect x="40" y="672" width="920" height="34" rx="9" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.3"/>
<text x="56" y="688" style="font-size:11px;font-weight:800;fill:#DC2626">⚠ RELIABILITY GAP — launchd does NOT fire while the Mac sleeps.</text>
<text x="56" y="701" style="font-size:10px;fill:#991b1b">Close the lid and the 5A/6A/7A/Fri rhythm silently misses (same failure class as JARVIS-QUEUE-001). Fix: decouple schedule-critical triggers to Railway/GHA — COMPUTE-ROUTER Ph2.</text>
</svg>

<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Plus Jakarta Sans',system-ui,sans-serif">
<title id="t">SaSMaster skill fleet — domain map</title>
<desc id="d">Roughly forty skills organized into seven domains: data and fusion, control and build, insight and research, UI and design, voice and content, exec and learning, and output and tooling. Skills are composed at runtime via progressive disclosure and promoted through the self-learning lifecycle when a pattern recurs three or more times.</desc>
<defs>
<style>
 .k{font-size:12px;font-weight:800;letter-spacing:3px;fill:#7C3AED}
 .h1{font-size:26px;font-weight:800;fill:#1F1B33}
 .ct{font-size:13px;font-weight:800;fill:#fff}
 .cn{font-size:11px;font-weight:800;fill:#fff;font-family:'Share Tech Mono',monospace;opacity:.92}
 .sk{font-size:10px;fill:#2c2740;font-family:'Share Tech Mono',monospace}
 .bk{font-size:12px;font-weight:700;fill:#3a2d63}
</style>
</defs>
<rect x="0" y="0" width="1000" height="600" rx="16" fill="#FAF7FF"/>
<rect x="1" y="1" width="998" height="598" rx="15" fill="none" stroke="#E5DCFF" stroke-width="2"/>
<text x="40" y="40" class="k">SKILL FLEET</text>
<text x="40" y="68" class="h1">~40 skills · 7 domains · composed at runtime</text>

<!-- hub banner -->
<rect x="40" y="84" width="920" height="40" rx="10" fill="#F4F1FF" stroke="#D6C9Fb"/>
<rect x="40" y="84" width="6" height="40" rx="3" fill="#7C3AED"/>
<text x="62" y="103" style="font-size:12px;font-weight:800;fill:#4C1D95">PROGRESSIVE DISCLOSURE</text>
<text x="62" y="118" style="font-size:10.5px;fill:#5A5470">metadata (~100 words) → SKILL.md (&lt;500 lines) → resources · promoted via the lifecycle when a pattern recurs ≥3×</text>


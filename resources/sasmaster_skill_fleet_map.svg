<rect x="40" y="490" width="220" height="56" rx="11" fill="#2A1163"/><rect x="244" y="490" width="16" height="56" fill="#2A1163"/>
<text x="58" y="514" class="ct">OUTPUT &amp; TOOLING</text><text x="58" y="532" class="cn" fill="#C7B8FF">6 · the deliverable layer</text>
<text x="280" y="514" class="sk" font-size="11">docx · pptx · xlsx · pdf</text>

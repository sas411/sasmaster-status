<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Plus Jakarta Sans',system-ui,sans-serif">
<title id="t">SaSMaster agent fleet — composition, tiers, model routing and health</title>
<desc id="d">A 51-agent fleet split into 15 native scheduled agents, 5 build subagents, and 31 marketplace specialists. Native agents run the business on cron; subagents execute builds under model routing (Opus for planning, Sonnet for execution, Haiku for cheap classification); marketplace agents are on call. Health at snapshot: 11 running, 14 live, 2 in error, 1 never-run, 1 drafted.</desc>
<defs>
<style>
 .k{font-size:12px;font-weight:800;letter-spacing:3px;fill:#7C3AED}
 .h1{font-size:26px;font-weight:800;fill:#1F1B33}
 .seg{font-size:13px;font-weight:800;fill:#fff}
 .ch{font-size:13px;font-weight:800;fill:#fff}
 .ct{font-size:9px;font-weight:700;fill:#fff;opacity:.9;letter-spacing:.5px}
 .li{font-size:10.5px;fill:#2c2740}
 .lim{font-size:9.5px;fill:#5A5470;font-family:'Share Tech Mono',monospace}
 .mt{font-size:13px;font-weight:800;fill:#fff}
 .ms{font-size:10px;fill:#fff;opacity:.92}
 .pill{font-size:11px;font-weight:700;font-family:'Share Tech Mono',monospace}
</style>
</defs>
<rect x="0" y="0" width="1000" height="660" rx="16" fill="#FAF7FF"/>

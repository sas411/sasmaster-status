<svg viewBox="0 0 1000 880" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="'Plus Jakarta Sans', system-ui, sans-serif">
  <title id="ttl">SaSMaster self-learning flywheel with control plane at the hub</title>
  <desc id="desc">Six work stages form a clockwise rim loop — question in, compose, serve, bless equals label, deposit, promote. The control plane sits at the center and connects by governance spokes to every stage, routing work, metering autonomy, and enforcing fail-open and fail-closed policy. Its central dial shows the share of outputs shipping with no human touch, rising as confidence sustains. The whole loop is aimed at one mission cell (the wedge) and every turn deepens the currency-agnostic canonical layer (the moat).</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap');
      .stage { font-size: 14px; font-weight: 700; fill: #4C1D95; letter-spacing: .4px; }
      .sub   { font-size: 10.5px; font-weight: 500; fill: #5A5470; }
      .badge { font-size: 13px; font-weight: 800; fill: #FFFFFF; }
      .kicker{ font-size: 12px; font-weight: 700; fill: #7C3AED; letter-spacing: 3px; }
      .h1    { font-size: 27px; font-weight: 800; fill: #1F1B33; }
      .wedge { font-size: 12px; font-weight: 700; fill: #059669; letter-spacing: .3px; }
      .tag-t { font-size: 11px; font-weight: 800; fill: #4C1D95; letter-spacing: 1.5px; }
      .tag-b { font-size: 11px; font-weight: 500; fill: #5A5470; }
      .hub-l { font-size: 14px; font-weight: 800; fill: #4C1D95; letter-spacing: 1.5px; }
      .hub-s { font-size: 10px; font-weight: 600; fill: #5A5470; }
      .hub-a { font-size: 11px; font-weight: 800; fill: #059669; }
      .leg   { font-size: 10.5px; font-weight: 600; fill: #5A5470; }
    </style>
    <pattern id="diag" width="22" height="22" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="22" stroke="#A682F2" stroke-width="1" opacity="0.05"/>
    </pattern>
    <marker id="flow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7C3AED"/>
    </marker>
    <marker id="spoke" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A682F2"/>
    </marker>
    <marker id="gin" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="880" rx="18" fill="#FAF7FF"/>
  <rect x="0" y="0" width="1000" height="880" rx="18" fill="url(#diag)"/>
  <rect x="1" y="1" width="998" height="878" rx="17" fill="none" stroke="#E5DCFF" stroke-width="2"/>

  <text x="500" y="46" text-anchor="middle" class="kicker">SASMASTER · OPERATING ENGINE</text>
  <text x="500" y="80" text-anchor="middle" class="h1">The Self-Learning Flywheel</text>
  <text x="500" y="106" text-anchor="middle" class="wedge">WEDGE — the entire loop is aimed at ONE mission cell ↓</text>

  <g fill="none" stroke="#A682F2" stroke-width="1.6" stroke-dasharray="4 4" opacity="0.85" marker-end="url(#spoke)">
    <path d="M500,320 L500,217"/>
    <path d="M595.3,375 L684,323.5"/>
    <path d="M595.3,485 L684,536.5"/>
    <path d="M500,540 L500,643"/>
    <path d="M404.7,485 L316,536.5"/>
    <path d="M404.7,375 L316,323.5"/>
  </g>

  <g fill="none" stroke="#7C3AED" stroke-width="2.4" marker-end="url(#flow)" opacity="0.9">
    <path d="M588.9,185.7 A260,260 0 0 1 667.1,230.7"/>
    <path d="M756.0,384.8 A260,260 0 0 1 756.0,475.2"/>
    <path d="M667.1,629.3 A260,260 0 0 1 588.9,674.3"/>
    <path d="M411.1,674.3 A260,260 0 0 1 332.9,629.3"/>
    <path d="M244.0,475.2 A260,260 0 0 1 244.0,384.8"/>
    <path d="M332.9,230.7 A260,260 0 0 1 411.1,185.7"/>
  </g>

  <g>
    <rect x="410" y="130" width="180" height="80" rx="12" fill="#FFFFFF" stroke="#059669" stroke-width="1.8"/>
    <circle cx="430" cy="152" r="13" fill="#7C3AED"/><text x="430" y="157" text-anchor="middle" class="badge">1</text>
    <text x="500" y="168" text-anchor="middle" class="stage">QUESTION IN</text>
    <text x="500" y="188" text-anchor="middle" class="sub">user · intel agent</text>
  </g>
  <g>
    <rect x="635.2" y="260" width="180" height="80" rx="12" fill="#FFFFFF" stroke="#E5DCFF" stroke-width="1.5"/>
    <circle cx="655.2" cy="282" r="13" fill="#7C3AED"/><text x="655.2" y="287" text-anchor="middle" class="badge">2</text>
    <text x="725.2" y="298" text-anchor="middle" class="stage">COMPOSE</text>
    <text x="725.2" y="318" text-anchor="middle" class="sub">agents · skills · spine</text>
  </g>
  <g>
    <rect x="635.2" y="520" width="180" height="80" rx="12" fill="#FFFFFF" stroke="#E5DCFF" stroke-width="1.5"/>
    <circle cx="655.2" cy="542" r="13" fill="#7C3AED"/><text x="655.2" y="547" text-anchor="middle" class="badge">3</text>
    <text x="725.2" y="558" text-anchor="middle" class="stage">SERVE</text>
    <text x="725.2" y="578" text-anchor="middle" class="sub">answer on the wedge</text>
  </g>
  <g>
    <rect x="410" y="650" width="180" height="80" rx="12" fill="#FFFFFF" stroke="#E5DCFF" stroke-width="1.5"/>
    <circle cx="430" cy="672" r="13" fill="#7C3AED"/><text x="430" y="677" text-anchor="middle" class="badge">4</text>
    <text x="500" y="688" text-anchor="middle" class="stage">BLESS = LABEL</text>
    <text x="500" y="708" text-anchor="middle" class="sub">human gate</text>
  </g>
  <g>
    <rect x="184.8" y="520" width="180" height="80" rx="12" fill="#FFFFFF" stroke="#E5DCFF" stroke-width="1.5"/>
    <circle cx="204.8" cy="542" r="13" fill="#7C3AED"/><text x="204.8" y="547" text-anchor="middle" class="badge">5</text>
    <text x="274.8" y="558" text-anchor="middle" class="stage">DEPOSIT</text>
    <text x="274.8" y="578" text-anchor="middle" class="sub">catalog · gold · skill</text>
  </g>
  <g>
    <rect x="184.8" y="260" width="180" height="80" rx="12" fill="#FFFFFF" stroke="#E5DCFF" stroke-width="1.5"/>
    <circle cx="204.8" cy="282" r="13" fill="#7C3AED"/><text x="204.8" y="287" text-anchor="middle" class="badge">6</text>
    <text x="274.8" y="298" text-anchor="middle" class="stage">PROMOTE</text>
    <text x="274.8" y="318" text-anchor="middle" class="sub">pattern ≥3 → skill</text>
  </g>

  <path d="M500,118 L500,128" fill="none" stroke="#059669" stroke-width="2.6" marker-end="url(#gin)"/>

  <circle cx="500" cy="430" r="110" fill="#FFFFFF" stroke="#A682F2" stroke-width="2"/>
  <circle cx="500" cy="430" r="86" fill="none" stroke="#E5DCFF" stroke-width="11"/>
  <circle cx="500" cy="430" r="86" fill="none" stroke="#059669" stroke-width="11" stroke-linecap="round"
          stroke-dasharray="302 238" transform="rotate(-90 500 430)"/>
  <text x="500" y="408" text-anchor="middle" class="hub-l">CONTROL PLANE</text>
  <text x="500" y="426" text-anchor="middle" class="hub-s">routes work · governs every stage</text>
  <text x="500" y="446" text-anchor="middle" class="hub-a">↑ meters autonomy</text>
  <text x="500" y="462" text-anchor="middle" class="hub-s">fail-open / fail-closed policy</text>

  <g>
    <rect x="40" y="800" width="430" height="52" rx="10" fill="#FFFFFF" stroke="#E5DCFF" stroke-width="1.3"/>
    <text x="58" y="824" class="tag-t">MOAT</text>
    <text x="58" y="842" class="tag-b">every turn deepens the currency-agnostic canonical layer</text>
  </g>
  <g transform="translate(520,800)">
    <rect x="0" y="0" width="440" height="52" rx="10" fill="#FFFFFF" stroke="#E5DCFF" stroke-width="1.3"/>
    <circle cx="20" cy="19" r="6" fill="#7C3AED"/><text x="33" y="23" class="leg">rim = work flow</text>
    <line x1="150" y1="19" x2="172" y2="19" stroke="#A682F2" stroke-width="2" stroke-dasharray="4 3"/><text x="180" y="23" class="leg">spoke = governance</text>
    <circle cx="330" cy="19" r="6" fill="#059669"/><text x="343" y="23" class="leg">autonomy / wedge</text>
    <text x="20" y="42" class="tag-b">deposit (stage 5) is turn one of the loop</text>
  </g>
</svg>
